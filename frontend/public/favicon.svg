<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="diamond-clip">
      <polygon points="80,5 155,95 80,195 5,95"/>
    </clipPath>
  </defs>

  <!-- Light blue diamond (sclera background) -->
  <polygon points="80,5 155,95 80,195 5,95" fill="#7EC5E8"/>

  <!-- Large dark blue eyeball, clipped to diamond -->
  <!-- Circle center nudged right so right side is clipped; left arc stays visible -->
  <g clip-path="url(#diamond-clip)">
    <circle cx="95" cy="98" r="70" fill="#1B52B5"/>
  </g>

  <!-- Circle arc outline, clipped to diamond -->
  <g clip-path="url(#diamond-clip)">
    <circle cx="95" cy="98" r="70" fill="none" stroke="#111111" stroke-width="4"/>
  </g>

  <!-- Green iris oval near centre -->
  <g clip-path="url(#diamond-clip)">
    <ellipse cx="87" cy="104" rx="8" ry="6" fill="#2DA84E"/>
  </g>

  <!-- Diamond outline on top -->
  <polygon points="80,5 155,95 80,195 5,95"
           fill="none" stroke="#111111" stroke-width="5" stroke-linejoin="miter"/>
</svg>
